<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big Dogs Don't Cry - Redirecting...</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(160deg, #fdf2f7 0%, #f5f0eb 50%, #fce4ec 100%);
    }
    .loader {
      text-align: center;
      padding: 40px;
      max-width: 400px;
    }
    .loader img {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
    }
    .loader p {
      color: #888;
      font-size: 15px;
      line-height: 1.6;
    }
    .btn {
      color: #fff;
      background: linear-gradient(135deg, #E91E63, #C2185B);
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      margin-top: 16px;
      padding: 14px 40px;
      border-radius: 50px;
      font-size: 16px;
      box-shadow: 0 4px 15px rgba(233,30,99,0.3);
    }
  </style>
</head>
<body>
  <div class="loader">
    <img src="https://static.wixstatic.com/media/4cb683_a8d649d3589846568a30460f1d077d32~mv2.png/v1/fill/w_362,h_362,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/bddc_logo-removebg-preview.png" alt="BDDC">
    <p id="msg">Loading your form...</p>
    <a id="fallback" class="btn" href="#" style="display:none;">Open Form</a>
  </div>
  <script>
    (function() {
      var BASE = 'https://script.google.com/macros/s/AKfycbw0qd7N-UHb25rwKCHAWLoa_66lexJ-JxuQ6FuXdyrxS-H0rX0113hgSYQZ-KbKRurHEw/exec';
      var params = window.location.search;
      var target = BASE + params;
      var fallback = document.getElementById('fallback');
      var msg = document.getElementById('msg');

      fallback.href = target;

      // Try fetching the GAS page and rendering it inline via an iframe
      // This completely avoids the /u/1/ issue since the request comes from
      // a non-Google domain (GitHub Pages)
      try {
        var iframe = document.createElement('iframe');
        iframe.src = target;
        iframe.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999;';
        document.body.appendChild(iframe);
        msg.textContent = 'Loading...';
        
        // Show fallback button after 5 seconds in case iframe doesn't work
        setTimeout(function() {
          fallback.style.display = 'inline-block';
          msg.textContent = 'If the form does not appear, click below:';
        }, 5000);
      } catch(e) {
        // If iframe fails, show the button immediately
        fallback.style.display = 'inline-block';
        msg.textContent = 'Click below to open your form:';
      }
    })();
  </script>
</body>
</html>
